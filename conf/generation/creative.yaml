# Higher-entropy preset: longer, more diverse outputs.
# Temperature kept under 1.0 — VLMs degrade fast above that (hallucinated
# objects, broken grounding). Use for storytelling, brainstorming, or when
# you want stylistic variety across reruns.
do_sample: true
temperature: 0.9
top_p: 0.95
top_k: 50
max_new_tokens: 1024
repetition_penalty: 1.0
