# Eval dataset descriptor. `dataset` è il nome logico usato per la UI
# Weave e per il dispatch del loader (oggi cablato a `egoschema` in
# main.py); `root` è la directory locale prodotta dallo script di
# prefetch (layout: metadata.jsonl + videos/<video_idx>.mp4).
dataset: egoschema
root: ${oc.env:HOME}/datasets/egoschema_subset_20
